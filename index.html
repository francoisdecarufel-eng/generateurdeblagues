${jokeInputMode === 'structured' ? `Nombre total de blagues saisies : ${jokes.length}\n` : ''}

- Une seule blague affichée à la fois.
- Affichage conçu pour le plein écran (ratio 16:9 de préférence).
- Présence d'une grande image principale illustrant la blague.
- Typographie très lisible, adaptée aux élèves du primaire (ex: police sans serif, taille généreuse).
- Interface adaptée à une projection en classe (fort contraste, éléments interactifs évidents).

2. POUR CHAQUE BLAGUE
- L'affichage se fait sous forme de carte interactive indépendante.
- L'illustration doit être générée/intégrée automatiquement selon le contenu de la blague, tout en gardant une cohérence stylistique globale.

      };

      const copyToClipboard = async () => {
        try {
          if (navigator?.clipboard?.writeText) {
            await navigator.clipboard.writeText(generatedPrompt);
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          } else {
            fallbackCopyTextToClipboard(generatedPrompt);
          }
        } catch (err) {
          console.warn("L'API Presse-papiers a échoué, tentative de secours...", err);
          fallbackCopyTextToClipboard(generatedPrompt);
        }
      };

      const fallbackCopyTextToClipboard = (text) => {
        try {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          textArea.style.top = "0";
          textArea.style.left = "0";
          textArea.style.position = "fixed";

          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();

          const successful = document.execCommand('copy');
          if (successful) {
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          }
          document.body.removeChild(textArea);
        } catch (err) {
          console.error("Échec de la copie de secours.", err);
        }
      };

                <TabButton id="styles" icon={SparklesIcon} label="Styles de blagues" />
                <TabButton id="visual" icon={ImageIcon} label="Visuel & Audio" />
                <TabButton id="interaction" icon={MousePointerClickIcon} label="Interaction & Navigation" />
                <TabButton id="jokes" icon={MessageSquareIcon} label={jokeInputMode === 'bulk' ? "Blagues (Vrac)" : `Blagues (${jokes.length})`} />
              </div>

              {/* Contenu des onglets */}
              <div className="p-6 sm:p-8 bg-gray-50/30">
                
                {/* ONGLET 1: GÉNÉRAL (VIERGE AU DÉMARRAGE) */}
                {activeTab === 'general' && (
                  <div className="space-y-6 animate-fadeIn">
                    <h2 className="text-lg font-semibold text-gray-800 border-b pb-2">Informations générales</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div className="space-y-2">
                        <label className="block text-sm font-medium text-gray-700">Titre de l'activité</label>
                        <input 
                          type="text" 
                          value={title} 
                          onChange={(e) => setTitle(e.target.value)} 
                          className="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white" 
                          placeholder="Saisissez un titre..." 
                        />
                      </div>
                      <div className="space-y-2">
                        <label className="block text-sm font-medium text-gray-700">Sous-titre (facultatif)</label>
                        <input 
                          type="text" 
                          value={subtitle} 
                          onChange={(e) => setSubtitle(e.target.value)} 
                          className="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white" 
                          placeholder="Ex: Spécial animaux" 
                        />
                      </div>
                      <div className="space-y-2">
                        <label className="block text-sm font-medium text-gray-700">Niveau scolaire</label>
                        <select 
                          value={level} 
                          onChange={(e) => setLevel(e.target.value)} 
                          className="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white"
                        >
                          <option value="">-- Sélectionner un niveau scolaire --</option>
                          {levels.map(l => <option key={l} value={l}>{l}</option>)}
                        </select>
                      </div>
                      <div className="space-y-2">
                        <label className="block text-sm font-medium text-gray-700">Thème principal</label>
                        <select 
                          value={theme} 
                          onChange={(e) => setTheme(e.target.value)} 
                          className="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white"
                        >
                          <option value="">-- Sélectionner un thème --</option>
                          {themes.map(t => <option key={t} value={t}>{t}</option>)}
                        </select>
                        {theme === "Autre" && (
                          <input 
                            type="text" 
                            value={customTheme} 
                            onChange={(e) => setCustomTheme(e.target.value)} 
                            className="w-full mt-2 p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white animate-fadeIn" 
                            placeholder="Écrivez le thème de votre choix..." 
                          />
                        )}
                      </div>
                      <div className="space-y-2 md:col-span-2">
                        <label className="block text-sm font-medium text-gray-700 font-semibold text-blue-800">Format d'export souhaité par l'IA cible</label>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mt-2">
                          {exportTypes.map(type => (
                            <div key={type} 
                              onClick={() => setExportType(type)}
                              className={`cursor-pointer border rounded-md p-3 text-center text-sm transition-all ${exportType === type ? 'bg-blue-50 border-blue-500 text-blue-700 font-medium shadow-sm' : 'bg-white border-gray-200 text-gray-600 hover:border-gray-300 hover:bg-gray-50'}`}
                            >
                              {type}
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* ONGLET STYLES DE BLAGUES (VIERGE AU DÉMARRAGE) */}
                {activeTab === 'styles' && (
                  <div className="space-y-6 animate-fadeIn">
                    <div className="border-b pb-2">
                      <h2 className="text-lg font-semibold text-gray-800">Styles de blagues recommandés</h2>
                      <p className="text-sm text-gray-500 mt-1">Sélectionnez un ou plusieurs styles. Ils piloteront et adapteront la mise en scène de vos blagues de façon unique dans le rendu final.</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {jokeStylesList.map((style) => (
                        <label 
                          key={style.id} 
                          className={`flex items-start gap-3 p-4 rounded-lg border cursor-pointer transition-all ${
                            jokeStyles.includes(style.id) 
                              ? 'bg-blue-50 border-blue-400 shadow-sm' 
                              : 'bg-white border-gray-200 hover:border-gray-300 hover:bg-gray-50'
                          }`}
                        >
                          <div className="mt-0.5">
                            <input 
                              type="checkbox" 
                              checked={jokeStyles.includes(style.id)} 
                              onChange={() => toggleJokeStyle(style.id)}
                              className="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
                            />
                          </div>
                          <div>
                            <span className={`block font-medium ${jokeStyles.includes(style.id) ? 'text-blue-800' : 'text-gray-700'}`}>
                              {style.id}
                            </span>
                            <span className="block text-xs text-gray-500 mt-1">
                              {style.desc}
                            </span>
                          </div>
                        </label>
                      ))}
                    </div>
                    <div className="bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-r-md mt-4">
                      <p className="text-sm text-yellow-800 font-medium">Contrainte d'adaptation et de sécurité intégrée automatiquement :</p>
                      <p className="text-sm text-yellow-700 mt-1">
                        « Le style choisi influence uniquement la structure et la mise en scène de la blague. Toutes les blagues doivent demeurer courtes, adaptées au primaire, inoffensives et compréhensibles pour le niveau visé. De plus, chaque style sélectionné est configuré pour adapter impérativement le visuel et les interactions de la blague correspondante. »
                      </p>
                    </div>
                  </div>
                )}

                {/* ONGLET 2: VISUEL & AUDIO (SELECTION MULTIPLE ET VIERGE) */}
                {activeTab === 'visual' && (
                  <div className="space-y-6 animate-fadeIn">
                    <h2 className="text-lg font-semibold text-gray-800 border-b pb-2">Apparence visuelle & Sonore</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      
                      {/* Style visuel : MULTIPLE CHOIX */}
                      <div className="space-y-2 md:col-span-2">
                        <label className="block text-sm font-medium text-gray-700">Styles visuels des illustrations <span className="text-xs text-blue-600 font-normal">(Sélection multiple possible)</span></label>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 mt-2">
                          {visualStyles.map(v => {
                            const isSelected = visualStylesSel.includes(v);
                            return (
                              <div 
                                key={v}
                                onClick={() => toggleSelection(v, visualStylesSel, setVisualStylesSel)}
                                className={`cursor-pointer border rounded-md p-3 text-sm flex items-center gap-3 transition-all ${isSelected ? 'bg-blue-50 border-blue-500 text-blue-700 font-medium shadow-sm' : 'bg-white border-gray-200 text-gray-600 hover:border-gray-300 hover:bg-gray-50'}`}
                              >
                                <input 
                                  type="checkbox" 
                                  checked={isSelected} 
                                  onChange={() => {}} 
                                  className="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500" 
                                />
                                <span>{v}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>

                      <div className="space-y-2">
                        <label className="block text-sm font-medium text-gray-700">Ambiance générale</label>
                        <select value={atmosphere} onChange={(e) => setAtmosphere(e.target.value)} className="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                          <option value="">-- Choisir une ambiance --</option>
                          {atmospheres.map(a => <option key={a} value={a}>{a}</option>)}
                        </select>
                      </div>
                      <div className="space-y-2">
                        <label className="block text-sm font-medium text-gray-700">Palette de couleurs</label>
                        <select value={colorPalette} onChange={(e) => setColorPalette(e.target.value)} className="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                          <option value="">-- Choisir une palette --</option>
                          {colorPalettes.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                      <div className="space-y-2">
                        <label className="block text-sm font-medium text-gray-700">Niveau d'animation global</label>
                        <select value={animationLevel} onChange={(e) => setAnimationLevel(e.target.value)} className="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                          <option value="">-- Choisir le niveau d'animation --</option>
                          {animationLevels.map(a => <option key={a} value={a}>{a}</option>)}
                        </select>
                      </div>

                      {/* Effets sonores : MULTIPLE CHOIX */}
                      <div className="space-y-2 md:col-span-2 pt-2 border-t border-gray-200">
                        <label className="block text-sm font-medium text-gray-700 flex items-center gap-1.5">
                          <Volume2Icon size={16} /> Effets sonores souhaités <span className="text-xs text-blue-600 font-normal">(Sélection multiple possible)</span>
                        </label>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mt-2">
                          {soundOptions.map(sound => {
                            const isSelected = soundEffectsSel.includes(sound);
                            return (
                              <div key={sound} 
                                onClick={() => toggleSelection(sound, soundEffectsSel, setSoundEffectsSel)}
                                className={`cursor-pointer border rounded-md p-3 text-center text-sm flex items-center justify-center gap-2 transition-all ${isSelected ? 'bg-blue-50 border-blue-500 text-blue-700 font-medium shadow-sm' : 'bg-white border-gray-200 text-gray-600 hover:border-gray-300 hover:bg-gray-50'}`}
                              >
                                <input 
                                  type="checkbox" 
                                  checked={isSelected} 
                                  onChange={() => {}} 
                                  className="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500" 
                                />
                                <span>{sound}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* ONGLET 3: INTERACTION & NAVIGATION (VIERGE AU DÉMARRAGE) */}
                {activeTab === 'interaction' && (
                  <div className="space-y-6 animate-fadeIn">
                    <h2 className="text-lg font-semibold text-gray-800 border-b pb-2">Navigation et Interaction</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                      
                      {/* Section Navigation */}
                      <div className="space-y-5 bg-white p-5 rounded-lg border border-gray-200">
                        <h3 className="font-medium text-blue-700 flex items-center gap-2">
                          <LayoutTemplateIcon size={18}/> Paramètres de navigation
                        </h3>
                        <div className="space-y-2">
                          <label className="block text-sm font-medium text-gray-700">Mode de navigation</label>
                          <select value={navigationMode} onChange={(e) => setNavigationMode(e.target.value)} className="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                            <option value="">-- Choisir un mode de navigation --</option>
                            {navModes.map(n => <option key={n} value={n}>{n}</option>)}
                          </select>
                        </div>
                        <div className="space-y-2">
                          <label className="block text-sm font-medium text-gray-700">Afficher l'indicateur de progression</label>
                          <div className="flex gap-4 mt-1">
                            <label className="flex items-center gap-2 cursor-pointer">
                              <input type="radio" name="prog" value="Oui" checked={showProgress === "Oui"} onChange={() => setShowProgress("Oui")} className="w-4 h-4 text-blue-600 focus:ring-blue-500 border-gray-300" />
                              <span className="text-sm">Oui</span>
                            </label>
                            <label className="flex items-center gap-2 cursor-pointer">
                              <input type="radio" name="prog" value="Non" checked={showProgress === "Non"} onChange={() => setShowProgress("Non")} className="w-4 h-4 text-blue-600 focus:ring-blue-500 border-gray-300" />
                              <span className="text-sm">Non</span>
                            </label>
                          </div>
                        </div>
                      </div>

                      {/* Section Révélation */}
                      <div className="space-y-5 bg-white p-5 rounded-lg border border-gray-200">
                        <h3 className="font-medium text-blue-700 flex items-center gap-2">
                          <MousePointerClickIcon size={18}/> Révélation de la réponse
                        </h3>
                        <div className="space-y-2">
                          <label className="block text-sm font-medium text-gray-700">Type d'interaction (Bouton)</label>
                          <select value={interactionType} onChange={(e) => setInteractionType(e.target.value)} className="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
                            <option value="">-- Choisir le type d'interaction --</option>
                            {interactions.map(i => <option key={i} value={i}>{i}</option>)}
                          </select>
                        </div>
                        <div className="space-y-2">
                          <label className="block text-sm font-medium text-gray-700">Animation humoristique lors de la révélation</label>
                          <div className="flex gap-4 mt-1">
                            <label className="flex items-center gap-2 cursor-pointer">
                              <input type="radio" name="animRev" value="Oui" checked={revealAnimation === "Oui"} onChange={() => setRevealAnimation("Oui")} className="w-4 h-4 text-blue-600 focus:ring-blue-500 border-gray-300" />
                              <span className="text-sm">Oui</span>
                            </label>
                            <label className="flex items-center gap-2 cursor-pointer">
                              <input type="radio" name="animRev" value="Non" checked={revealAnimation === "Non"} onChange={() => setRevealAnimation("Non")} className="w-4 h-4 text-blue-600 focus:ring-blue-500 border-gray-300" />
                              <span className="text-sm">Non</span>
                            </label>
                          </div>
                        </div>
                        <div className="space-y-2">
                          <label className="block text-sm font-medium text-gray-700">Effet sonore spécifique lors de la révélation</label>
                          <div className="flex gap-4 mt-1">
                            <label className="flex items-center gap-2 cursor-pointer">
                              <input type="radio" name="sndRev" value="Oui" checked={revealSound === "Oui"} onChange={() => setRevealSound("Oui")} className="w-4 h-4 text-blue-600 focus:ring-blue-500 border-gray-300" />
                              <span className="text-sm">Oui</span>
                            </label>
                            <label className="flex items-center gap-2 cursor-pointer">
                              <input type="radio" name="sndRev" value="Non" checked={revealSound === "Non"} onChange={() => setRevealSound("Non")} className="w-4 h-4 text-blue-600 focus:ring-blue-500 border-gray-300" />
                              <span className="text-sm">Non</span>
                            </label>
                          </div>
                        </div>
                      </div>

                    </div>
                  </div>
                )}

                {/* ONGLET 4: BLAGUES (VIERGES SANS CONTENU PRÉ-REMPLI) */}
                {activeTab === 'jokes' && (
                  <div className="space-y-6 animate-fadeIn">
                    <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between border-b pb-4 gap-4">
                      <div>
                        <h2 className="text-lg font-semibold text-gray-800">Contenu : Les Blagues</h2>
                        <p className="text-sm text-gray-500">Ajoutez vos propres blagues ci-dessous (laissez parler votre créativité !).</p>
                      </div>
                      
                      <div className="flex bg-gray-200 p-1 rounded-lg">
                        <button 
                          type="button"
                          onClick={() => setJokeInputMode('bulk')}
                          className={`flex items-center gap-2 px-3 py-1.5 text-sm font-medium rounded-md transition-colors ${jokeInputMode === 'bulk' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-600 hover:text-gray-800'}`}
                        >
                          <AlignLeftIcon size={16} /> Coller en vrac
                        </button>
                        <button 
                          type="button"
                          onClick={() => setJokeInputMode('structured')}
                          className={`flex items-center gap-2 px-3 py-1.5 text-sm font-medium rounded-md transition-colors ${jokeInputMode === 'structured' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-600 hover:text-gray-800'}`}
                        >
                          <MessageSquareIcon size={16} /> Saisie guidée
                        </button>
                      </div>
                    </div>
                    
                    {jokeInputMode === 'bulk' ? (
                      <div className="space-y-3">
                        <label className="block text-sm font-medium text-gray-700">
                          Collez toutes vos blagues ici (grand encadré vierge prêt pour l'intégration en bloc) :
                        </label>
                        <textarea 
                          value={bulkJokesText}
                          onChange={(e) => setBulkJokesText(e.target.value)}
                          className="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 min-h-[300px] resize-y font-mono text-sm bg-white"
                          placeholder="Collez ou tapez vos blagues en toute liberté...&#10;Exemple :&#10;1. Toc toc toc ! Qui est là ? C'est le livre. Quel livre ? Le livre de mathématiques qui a trop de problèmes !&#10;2. Quel est le comble pour un poisson ? Avoir peur de l'eau."
                        />
                      </div>
                    ) : (
                      <>
                        <div className="space-y-4">
                          {jokes.map((joke, index) => (
                            <div key={index} className="bg-white p-5 rounded-lg border border-gray-200 shadow-sm relative group transition-all hover:border-blue-300">
                              <div className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button 
                                  type="button"
                                  onClick={() => removeJoke(index)}
                                  className="text-red-500 hover:text-red-700 hover:bg-red-50 p-1.5 rounded-md transition-colors"
                                  title="Supprimer cette blague"
                                  disabled={jokes.length === 1}
                                >
                                  <Trash2Icon size={18} />
                                </button>
                              </div>
                              
                              <div className="flex items-center gap-2 mb-4">
                                <span className="flex items-center justify-center w-6 h-6 bg-blue-600 text-white rounded-full text-xs font-bold">
                                  {index + 1}
                                </span>
                                <h4 className="font-medium text-gray-700">Blague {index + 1}</h4>
                              </div>

                              <div className="space-y-4 pl-8">
                                <div>
                                  <label className="block text-sm font-medium text-gray-600 mb-1">Question (La mise en situation) :</label>
                                  <input 
                                    type="text" 
                                    value={joke.q} 
                                    onChange={(e) => updateJoke(index, 'q', e.target.value)} 
                                    className="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white" 
                                    placeholder="Saisissez la question..."
                                  />
                                </div>
                                <div>
                                  <label className="block text-sm font-medium text-gray-600 mb-1">Réponse (La chute) :</label>
                                  <input 
                                    type="text" 
                                    value={joke.a} 
                                    onChange={(e) => updateJoke(index, 'a', e.target.value)} 
                                    className="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 focus:border-green-500 bg-green-50/30" 
                                    placeholder="Saisissez la chute..."
                                  />
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>

                        <div className="pt-2">
                          <button 
                            type="button"
                            onClick={addJoke}
                            className="flex items-center justify-center w-full gap-2 py-3 border-2 border-dashed border-gray-300 rounded-lg text-gray-600 hover:text-blue-600 hover:border-blue-400 hover:bg-blue-50 transition-colors font-medium"
                          >
                            <PlusIcon size={20} />
                            Ajouter une nouvelle blague
                          </button>
                        </div>
                      </>
                    )}
                  </div>
                )}

                {/* Bouton générer principal */}
                <div className="mt-8 pt-6 border-t border-gray-200 flex justify-center">
                  <button 
                    type="button"
                    onClick={generatePromptText}
                    className="flex items-center justify-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white px-8 py-3.5 rounded-lg font-bold text-lg shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-0.5 w-full sm:w-auto"
                  >
                    <PlayIcon size={20} fill="currentColor" />
                    Générer la requête optimisée
                  </button>
                </div>

              </div>
            </div>

            {/* RÉSULTAT : LA REQUÊTE GÉNÉRÉE */}
            {generatedPrompt && (
              <div className="mt-8 mb-12 bg-gray-900 rounded-xl shadow-xl overflow-hidden border border-gray-800 animate-slideUp">
                <div className="bg-gray-800 px-6 py-4 flex items-center justify-between border-b border-gray-700">
                  <div className="flex items-center gap-3">
                    <CheckCircle2Icon className="text-green-400" size={24} />
                    <h3 className="text-lg font-semibold text-white">Requête prête !</h3>
                  </div>
                  <button 
                    type="button"
                    onClick={copyToClipboard}
                    className={`flex items-center gap-2 px-4 py-2 rounded-md font-medium transition-colors ${
                      copied ? 'bg-green-500/20 text-green-400' : 'bg-white/10 text-white hover:bg-white/20'
                    }`}
                  >
                    {copied ? <><CheckCircle2Icon size={16} /> Copié !</> : <><CopyIcon size={16} /> Copier le texte</>}
                  </button>
                </div>
                <div className="p-6">
                  <p className="text-gray-400 text-sm mb-4 italic">
                    Copiez le texte ci-dessous et collez-le dans l'IA cible (ChatGPT, Claude, Gemini, etc.) pour générer votre activité interactive de blagues.
                  </p>
                  <div className="bg-gray-950 rounded-lg p-5 border border-gray-800 overflow-x-auto relative">
                    <pre className="text-gray-300 font-mono text-sm whitespace-pre-wrap leading-relaxed">
                      {generatedPrompt}
                    </pre>
                  </div>
                  <div className="mt-6 flex justify-center">
                    <button 
                      type="button"
                      onClick={copyToClipboard}
                      className="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-lg font-medium transition-colors"
                    >
                      <CopyIcon size={18} /> {copied ? 'Texte copié dans le presse-papier !' : 'Copier la requête complète'}
                    </button>
                  </div>
                </div>
              </div>
            )}

          </main>
        </div>
      );
    };

    // Render principal
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

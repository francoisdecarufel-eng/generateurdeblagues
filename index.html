${jokeInputMode === 'structured' ? `Nombre total de blagues saisies : ${jokes.length}\n` : ''}

            setTimeout(() => setCopied(false), 2000);
          } else {
            fallbackCopyTextToClipboard(generatedPrompt);
          }
        } catch (err) {

          fallbackCopyTextToClipboard(generatedPrompt);
        }
      };

      const fallbackCopyTextToClipboard = (text) => {
        try {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          textArea.style.top = "0";
          textArea.style.left = "0";
          textArea.style.position = "fixed";

          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();

          const successful = document.execCommand('copy');
          if (successful) {
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          }
          document.body.removeChild(textArea);
        } catch (err) {
          console.error("Échec de la copie de secours.", err);
        }

                    type="button"
                    onClick={generatePromptText}
                    className="flex items-center justify-center gap-3 bg-gradient-to-r from-blue-600 via-indigo-600 to-indigo-700 hover:from-blue-700 hover:via-indigo-700 hover:to-indigo-800 text-white px-10 py-5 rounded-2xl font-black text-xl shadow-xl hover:shadow-2xl hover:scale-[1.03] active:scale-[0.97] transition-all w-full sm:w-auto"
                  >
                    <PlayIcon size={24} fill="currentColor" />
                    Générer la requête optimisée
                  </button>
                </div>

              </div>
            </div>

            {/* RÉSULTAT : LA REQUÊTE GÉNÉRÉE (SUPER DESIGN DU BLOCK DE REQUÊTE) */}
            {generatedPrompt && (
              <div className="mt-12 mb-16 bg-slate-900 rounded-3xl shadow-2xl overflow-hidden border border-slate-800 animate-slideUp">
                <div className="bg-slate-800/80 px-6 sm:px-8 py-5 flex flex-col sm:flex-row items-center justify-between border-b border-slate-800 gap-4">
                  <div className="flex items-center gap-3.5">
                    <CheckCircle2Icon className="text-emerald-400" size={26} />
                    <h3 className="text-xl font-black text-white">Requête de blagues prête !</h3>
                  </div>
                  <button 
                    type="button"
                    onClick={copyToClipboard}
                    className={`flex items-center gap-2 px-5 py-3 rounded-xl font-bold text-base transition-all hover:scale-[1.03] active:scale-[0.97] ${
                      copied ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-white/10 text-white hover:bg-white/20 border border-white/5'
                    }`}
                  >
                    {copied ? <><CheckCircle2Icon size={18} /> Copié !</> : <><CopyIcon size={18} /> Copier le prompt</>}
                  </button>
                </div>
                <div className="p-6 sm:p-8">
                  <p className="text-slate-400 text-base mb-6 italic leading-relaxed">
                    Copiez le texte ci-dessous et collez-le directement dans votre IA préférée (ChatGPT, Claude, Gemini, etc.) pour instantanément générer votre activité de blagues de niveau d'édition professionnel.
                  </p>
                  <div className="bg-slate-950 rounded-2xl p-6 border border-slate-800 overflow-x-auto relative shadow-inner">
                    <pre className="text-slate-300 font-mono text-sm sm:text-base whitespace-pre-wrap leading-relaxed select-all">
                      {generatedPrompt}
                    </pre>
                  </div>
                  <div className="mt-8 flex justify-center">
                    <button 
                      type="button"
                      onClick={copyToClipboard}
                      className="flex items-center gap-3 bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-xl font-bold text-lg transition-all hover:scale-[1.03] active:scale-[0.97] shadow-lg shadow-blue-900/30"
                    >
                      <CopyIcon size={20} /> {copied ? 'Texte copié dans votre presse-papiers !' : 'Copier la requête complète'}
                    </button>
                  </div>
                </div>
              </div>
            )}

          </main>
        </div>
      );
    };

    // Render principal
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
